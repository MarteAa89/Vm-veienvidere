<!doctype html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VM 2026 – Veien til finalen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    .wrap { width: 100%; max-width: 480px; }
    .header-title { font-size: 22px; font-weight: 700; color: #e6edf3; }
    .header-sub   { font-size: 12px; color: #6e7681; margin-top: 2px; }

    .team-picker {
      margin: 12px 0 0;
      display: flex; align-items: center; gap: 8px;
    }
    .team-picker label { font-size: 12px; color: #8b949e; white-space: nowrap; }
    .team-picker select {
      flex: 1;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 6px; padding: 6px 10px;
      color: #e6edf3; font-size: 13px;
      cursor: pointer; outline: none;
    }
    .team-picker select:focus { border-color: #58a6ff; }

    .info-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 7px 12px;
      font-size: 11px; color: #6e7681;
      margin: 8px 0; display: flex; align-items: center; gap: 6px;
    }

    .control-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 8px 12px; margin: 8px 0;
    }
    .ctrl-label { font-size: 12px; color: #8b949e; }
    .btn {
      font-size: 12px; font-weight: 600; padding: 5px 14px;
      border-radius: 6px; border: 1px solid #30363d;
      background: #21262d; color: #c9d1d9; cursor: pointer;
    }
    .btn:hover:not(:disabled) { background: #30363d; }
    .btn:disabled { color: #6e7681; cursor: not-allowed; }

    .error-box {
      background: #2d1414; border: 1px solid #f85149;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #f85149; margin-bottom: 12px; display: none;
    }
    .next-box {
      background: #0d1f3c; border: 1px solid #1f6feb;
      border-radius: 8px; padding: 9px 13px;
      font-size: 13px; color: #79c0ff; margin-bottom: 14px; display: none;
    }
    .next-dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #58a6ff;
      margin-right: 6px; vertical-align: middle;
    }

    .stats-grid { display: flex; gap: 8px; margin-bottom: 4px; }
    .stat-card {
      flex: 1; background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 8px; text-align: center;
    }
    .stat-num   { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 10px; color: #8b949e; margin-top: 2px; text-transform: uppercase; letter-spacing: .05em; }
    .gold { color: #e8c43a; }
    .pos  { color: #3fb950; }
    .neg  { color: #f85149; }

    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: #6e7681;
      border-bottom: 1px solid #21262d;
      padding-bottom: 4px; margin-top: 22px; margin-bottom: 10px;
    }

    table.st {
      width: 100%; border-collapse: collapse; font-size: 13px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; overflow: hidden; margin-bottom: 10px;
    }
    table.st th {
      background: #21262d; color: #8b949e;
      padding: 6px 8px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
    }
    table.st td { padding: 7px 8px; border-top: 1px solid #21262d; }
    table.st tr.sel td { color: #e8c43a; font-weight: 600; }

    .match-card {
      border: 1px solid #30363d; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 7px;
      display: flex; align-items: center; gap: 12px;
      background: #161b22;
    }
    .match-card.done     { background: #0f2318; border-left: 3px solid #238636; border-top-left-radius:0; border-bottom-left-radius:0; }
    .match-card.upcoming { background: #0d1f3c; border-left: 3px solid #1f6feb; border-top-left-radius:0; border-bottom-left-radius:0; }
    .flags  { font-size: 1.25rem; flex-shrink: 0; min-width: 46px; }
    .minfo  { flex: 1; }
    .mteams { font-size: 14px; font-weight: 600; color: #e6edf3; }
    .mmeta  { font-size: 11px; color: #8b949e; margin-top: 2px; }
    .mright { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .mresult { font-size: 17px; font-weight: 700; color: #3fb950; }

    .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .badge.done     { background: #0f2318; color: #3fb950; border: 1px solid #238636; }
    .badge.upcoming { background: #0d1f3c; color: #58a6ff; border: 1px solid #1f6feb; }
    .badge.tbd      { background: #161b22; color: #6e7681; border: 1px solid #30363d; }

    .ko-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 12px 14px;
    }
    .ko-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .ko-round  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #8b949e; }
    .ko-round.final { font-size: 13px; color: #e8c43a; }
    .ko-meta   { display: flex; align-items: center; gap: 7px; }
    .ko-date   { font-size: 11px; color: #6e7681; }
    .ko-scenario {
      font-size: 12px; color: #79c0ff;
      background: #0d1f3c; border: 1px solid #1f6feb;
      border-radius: 5px; padding: 5px 9px; margin-bottom: 6px;
    }
    .po-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #6e7681; margin-bottom: 5px; }
    .po-grid  { display: flex; flex-wrap: wrap; gap: 6px; }
    .po-tag   {
      background: #21262d; border: 1px solid #30363d;
      border-radius: 6px; padding: 5px 10px; font-size: 12px;
      display: flex; flex-direction: column; gap: 1px;
    }
    .po-team { font-weight: 600; color: #e6edf3; }
    .po-note { font-size: 10px; color: #8b949e; }
    .connector { text-align: center; color: #30363d; font-size: 14px; margin: 2px 0; }
    .trophy    { text-align: center; font-size: 2rem; margin: 18px 0 4px; }
    .footer    { text-align: center; font-size: 11px; color: #484f58; }
  </style>
</head>
<body>
<div class="wrap">

  <div style="margin-bottom:12px">
    <div class="header-title">VM 2026 &#8211; Veien til finalen</div>
    <div class="header-sub">FIFA World Cup &middot; USA / Canada / Mexico</div>
  </div>

  <div class="team-picker">
    <label for="team-select">Velg lag:</label>
    <select id="team-select" onchange="onTeamChange()">
      <option value="">Laster lag&hellip;</option>
    </select>
  </div>

  <div class="info-box">
    &#8505;&#65039; Data fra <strong style="color:#c9d1d9">openfootball/worldcup.json</strong> &middot; oppdateres ca. &eacute;n gang i d&oslash;gnet
  </div>

  <div class="control-bar">
    <div class="ctrl-label" id="ctrl-label">Laster data&hellip;</div>
    <button class="btn" id="refresh-btn" onclick="load()" disabled>Oppdater</button>
  </div>

  <div class="error-box" id="error-box"></div>
  <div class="next-box"  id="next-box"></div>
  <div class="stats-grid" id="stats"></div>

  <div class="section-label" id="group-label">Gruppestilling</div>
  <table class="st">
    <thead><tr>
      <th style="text-align:left;width:28px">#</th>
      <th style="text-align:left">Lag</th>
      <th style="text-align:center;width:28px">K</th>
      <th style="text-align:center;width:28px">V</th>
      <th style="text-align:center;width:28px">U</th>
      <th style="text-align:center;width:28px">T</th>
      <th style="text-align:center;width:36px">MF</th>
      <th style="text-align:center;width:28px">P</th>
    </tr></thead>
    <tbody id="standings"></tbody>
  </table>

  <div class="section-label" id="matches-label">Gruppespill &#8211; kamper</div>
  <div id="matches"></div>

  <div class="section-label" id="ko-label">Sluttspill &#8211; veien til finalen</div>
  <div id="knockout"></div>

  <div class="trophy">&#127942;</div>
  <div class="footer" id="footer"></div>
</div>

<script>
var DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";
var allMatches = [];
var selectedTeam = "";

// Flagg via Unicode
var ISO = {
  "Norway":"NO","France":"FR","Senegal":"SN","Iraq":"IQ",
  "Argentina":"AR","Brazil":"BR","Spain":"ES","Portugal":"PT",
  "Germany":"DE","Netherlands":"NL","Belgium":"BE","Sweden":"SE",
  "Switzerland":"CH","Mexico":"MX","USA":"US","Canada":"CA",
  "Denmark":"DK","Croatia":"HR","Uruguay":"UY","Japan":"JP",
  "South Korea":"KR","Morocco":"MA","Australia":"AU","Serbia":"RS",
  "Poland":"PL","Ecuador":"EC","Qatar":"QA","Tunisia":"TN",
  "Ghana":"GH","South Africa":"ZA","Turkey":"TR","Colombia":"CO",
  "Iran":"IR","Algeria":"DZ","Austria":"AT","Jordan":"JO",
  "Haiti":"HT","Paraguay":"PY","Ivory Coast":"CI","Egypt":"EG",
  "Saudi Arabia":"SA","Cape Verde":"CV","Panama":"PA","New Zealand":"NZ",
  "Curaçao":"CW","DR Congo":"CD","Uzbekistan":"UZ","Scotland":"SC",
  "Bosnia & Herzegovina":"BA","Cameroon":"CM","Wales":"GB",
  "Czech Republic":"CZ","England":"GB"
};

function flag(team) {
  var code = ISO[team] || "UN";
  return code.toUpperCase().replace(/./g, function(c){
    return String.fromCodePoint(c.charCodeAt(0) + 127397);
  });
}

function badge(status) {
  var labels = {done:"Ferdig", upcoming:"Kommende", tbd:"TBD"};
  return '<span class="badge ' + status + '">' + (labels[status]||"TBD") + '</span>';
}

function fmtDate(s) {
  if (!s) return "";
  var d = new Date(s);
  return d.toLocaleDateString("nb-NO", {weekday:"short", day:"numeric", month:"short"});
}

// Finn hvilken gruppe et lag tilhører
function getGroup(team, matches) {
  var m = matches.find(function(x){ return x.team1 === team || x.team2 === team; });
  return m ? m.group : null;
}

// Alle lag i en gruppe
function getGroupTeams(group, matches) {
  var teams = [];
  matches.forEach(function(m) {
    if (m.group !== group) return;
    if (teams.indexOf(m.team1) < 0) teams.push(m.team1);
    if (teams.indexOf(m.team2) < 0) teams.push(m.team2);
  });
  return teams;
}

function computeStandings(group, matches) {
  var teams = getGroupTeams(group, matches);
  var table = {};
  teams.forEach(function(t){ table[t] = {played:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}; });
  matches.forEach(function(m) {
    if (m.group !== group || !m.score) return;
    var g1 = m.score.ft[0], g2 = m.score.ft[1];
    var t1 = m.team1, t2 = m.team2;
    table[t1].played++; table[t2].played++;
    table[t1].gf += g1; table[t1].ga += g2;
    table[t2].gf += g2; table[t2].ga += g1;
    if (g1 > g2)      { table[t1].w++; table[t1].pts+=3; table[t2].l++; }
    else if (g1 < g2) { table[t2].w++; table[t2].pts+=3; table[t1].l++; }
    else { table[t1].d++; table[t1].pts++; table[t2].d++; table[t2].pts++; }
  });
  return teams.map(function(t){
    return Object.assign({team:t}, table[t], {gd: table[t].gf - table[t].ga});
  }).sort(function(a,b){ return b.pts-a.pts || b.gd-a.gd || b.gf-a.gf; });
}

function topScorer(team, matches) {
  var scorers = {};
  matches.forEach(function(m) {
    var gs = m.team1 === team ? m.goals1 : m.team2 === team ? m.goals2 : null;
    if (!gs) return;
    gs.forEach(function(g) {
      if (!g.name || g.owngoal) return;
      scorers[g.name] = (scorers[g.name] || 0) + 1;
    });
  });
  var best = null, bestN = 0;
  Object.keys(scorers).forEach(function(n){ if (scorers[n] > bestN) { best=n; bestN=scorers[n]; } });
  return best ? {name:best, goals:bestN} : null;
}

// Populer lagvelgeren – kun lag fra gruppespillet
function populateSelector(matches) {
  var teams = [];
  matches.forEach(function(m) {
    if (!m.group) return;
    if (teams.indexOf(m.team1) < 0) teams.push(m.team1);
    if (teams.indexOf(m.team2) < 0) teams.push(m.team2);
  });
  teams.sort();

  var sel = document.getElementById("team-select");
  sel.innerHTML = teams.map(function(t){
    return '<option value="' + t + '">' + t + '</option>';
  }).join("");

  // Default til Norge
  var def = teams.indexOf("Norway") > -1 ? "Norway" : teams[0];
  sel.value = def;
  selectedTeam = def;
}

function onTeamChange() {
  selectedTeam = document.getElementById("team-select").value;
  if (allMatches.length) renderTeam(selectedTeam, allMatches);
}

// VM 2026 bracket-struktur:
// Runde av 32: 1A-2B, 1B-2A, 1C-2D, 1D-2C, 1E-2F, 1F-2E, 1G-2H, 1H-2G,
//              1I-2J, 1J-2I, 1K-2L, 1L-2K, + 4 beste 3.-plasser
// Vi forenkler til: vis hvilke grupper som møter hverandre
var BRACKET = {
  "Group A": { r32opponent: "Group B", r32note: "1A møter 2B, 1B møter 2A" },
  "Group B": { r32opponent: "Group A", r32note: "1B møter 2A, 1A møter 2B" },
  "Group C": { r32opponent: "Group D", r32note: "1C møter 2D, 1D møter 2C" },
  "Group D": { r32opponent: "Group C", r32note: "1D møter 2C, 1C møter 2D" },
  "Group E": { r32opponent: "Group F", r32note: "1E møter 2F, 1F møter 2E" },
  "Group F": { r32opponent: "Group E", r32note: "1F møter 2E, 1E møter 2F" },
  "Group G": { r32opponent: "Group H", r32note: "1G møter 2H, 1H møter 2G" },
  "Group H": { r32opponent: "Group G", r32note: "1H møter 2G, 1G møter 2H" },
  "Group I": { r32opponent: "Group J", r32note: "1I møter 2J, 1J møter 2I" },
  "Group J": { r32opponent: "Group I", r32note: "1J møter 2I, 1I møter 2J" },
  "Group K": { r32opponent: "Group L", r32note: "1K møter 2L, 1L møter 2K" },
  "Group L": { r32opponent: "Group K", r32note: "1L møter 2K, 1K møter 2L" }
};

function koRoundsFor(team, matches) {
  var group = getGroup(team, matches);
  var bracket = BRACKET[group] || {};
  var oppGroup = bracket.r32opponent || "ukjent gruppe";

  // Finn de faktiske lagene i motstandergruppen
  var oppTeams = getGroupTeams(oppGroup, matches);
  var oppStanding = oppTeams.length ? computeStandings(oppGroup, matches) : [];

  // Bygg mulige motstandere for R32 fra motstandergruppen
  var r32possible = oppStanding.map(function(t) {
    return { team: t.team, iso: ISO[t.team] || "UN", note: t.team + " (" + oppGroup + ")" };
  });

  // R16: vinnere fra to nabobrackets – vi viser de to andre gruppene i samme halvdel
  // Forenklet: vis de to sterke lagene fra de to neste gruppene i bracket
  var allGroups = ["Group A","Group B","Group C","Group D","Group E","Group F",
                   "Group G","Group H","Group I","Group J","Group K","Group L"];
  var gi = allGroups.indexOf(group);
  // Finn halvdelen (par av par): A/B+C/D, E/F+G/H, I/J+K/L
  var halfStart = Math.floor(gi / 4) * 4;
  var r16groups = allGroups.slice(halfStart, halfStart + 4).filter(function(g){ return g !== group && g !== oppGroup; });
  var r16possible = [];
  r16groups.forEach(function(g) {
    var st = computeStandings(g, matches);
    if (st[0]) r16possible.push({ team: st[0].team, iso: ISO[st[0].team]||"UN", note: "Leder " + g });
    if (st[1]) r16possible.push({ team: st[1].team, iso: ISO[st[1].team]||"UN", note: "Nr. 2 " + g });
  });

  // QF: vinnere fra den andre halvdelen av kvartfinale-halvdelen
  var qfStart = Math.floor(gi / 8) * 8;
  var qfGroups = allGroups.slice(qfStart, qfStart + 8).filter(function(g){
    return g !== group && g !== oppGroup && r16groups.indexOf(g) < 0;
  });
  var qfPossible = [];
  qfGroups.forEach(function(g) {
    var st = computeStandings(g, matches);
    if (st[0]) qfPossible.push({ team: st[0].team, iso: ISO[st[0].team]||"UN", note: "Favoritt " + g });
  });

  return [
    { round:"Runde av 32", date:"29. jun \u2013 2. jul",
      scenario: bracket.r32note || ("Gruppevinner og 2.-plass fra " + group + " møter lag fra " + oppGroup),
      possible: r32possible
    },
    { round:"Runde av 16", date:"4.\u20137. jul",
      possible: r16possible
    },
    { round:"Kvartfinale", date:"10.\u201312. jul",
      possible: qfPossible
    },
    { round:"Semifinale", date:"15.\u201316. jul",
      venue:"MetLife Stadium, New York/New Jersey", possible:[]
    },
    { round:"Finale", date:"19. jul",
      venue:"MetLife Stadium, New York/New Jersey", possible:[], isFinal:true
    }
  ];
}

function countryFlag(iso) {
  return iso.toUpperCase().replace(/./g, function(c){
    return String.fromCodePoint(c.charCodeAt(0) + 127397);
  });
}

function renderTeam(team, matches) {
  var group = getGroup(team, matches);
  var groupMatches = matches.filter(function(m){ return m.group === group; });
  var teamMatches  = groupMatches.filter(function(m){ return m.team1 === team || m.team2 === team; });
  var standing     = computeStandings(group, matches);
  var teamRow      = standing.find(function(t){ return t.team === team; });
  var scorer       = topScorer(team, matches);

  // Oppdater titler
  document.getElementById("group-label").textContent = (group || "Gruppe") + " \u2013 stilling";
  document.getElementById("matches-label").textContent = "Gruppespill \u2013 " + team + "s kamper";
  document.getElementById("ko-label").textContent = "Sluttspill \u2013 " + team + "s vei til finalen";

  // Neste kamp
  var next = teamMatches.find(function(m){ return !m.score; });
  var nb = document.getElementById("next-box");
  if (next) {
    nb.innerHTML = '<span class="next-dot"></span><strong>Neste:</strong> ' +
      flag(next.team1) + ' ' + next.team1 + ' vs. ' +
      flag(next.team2) + ' ' + next.team2 +
      ' &middot; ' + fmtDate(next.date) +
      (next.ground ? ' &middot; ' + next.ground : '');
    nb.style.display = "block";
  } else {
    nb.style.display = "none";
  }

  // Statistikk
  var statsHtml = "";
  if (teamRow) {
    statsHtml += '<div class="stat-card"><div class="stat-num gold">' + teamRow.pts + '</div><div class="stat-label">Poeng</div></div>';
    statsHtml += '<div class="stat-card"><div class="stat-num gold">' + teamRow.gf + '</div><div class="stat-label">M\u00e5l scoret</div></div>';
    statsHtml += '<div class="stat-card"><div class="stat-num ' + (teamRow.gd >= 0 ? "pos" : "neg") + '">' + (teamRow.gd > 0 ? "+" : "") + teamRow.gd + '</div><div class="stat-label">M\u00e5lforskjell</div></div>';
  }
  if (scorer) {
    statsHtml += '<div class="stat-card" style="flex-basis:100%"><div class="stat-num gold">' + scorer.goals + '</div><div class="stat-label">M\u00e5l \u2013 ' + scorer.name + '</div></div>';
  }
  document.getElementById("stats").innerHTML = statsHtml;

  // Tabell
  document.getElementById("standings").innerHTML = standing.map(function(t, i) {
    var isSel = t.team === team;
    return '<tr class="' + (isSel ? "sel" : "") + '">' +
      '<td style="text-align:left">' + (i+1) + '</td>' +
      '<td style="text-align:left">' + flag(t.team) + ' ' + t.team + '</td>' +
      '<td style="text-align:center">' + t.played + '</td>' +
      '<td style="text-align:center">' + t.w + '</td>' +
      '<td style="text-align:center">' + t.d + '</td>' +
      '<td style="text-align:center">' + t.l + '</td>' +
      '<td style="text-align:center">' + (t.gd > 0 ? "+" : "") + t.gd + '</td>' +
      '<td style="text-align:center;font-weight:600">' + t.pts + '</td>' +
    '</tr>';
  }).join("");

  // Kamper
  document.getElementById("matches").innerHTML = teamMatches.map(function(m) {
    var done = !!m.score;
    var status = done ? "done" : "upcoming";
    var result = done ? m.score.ft[0] + "\u20138" + m.score.ft[1] : null;
    var resultStr = done ? m.score.ft[0] + "&#8211;" + m.score.ft[1] : null;
    var scorers = done ? [].concat(
      (m.goals1||[]).map(function(g){ return g.name + (g.penalty?" (pen)":g.owngoal?" (e.m.)":""); }),
      (m.goals2||[]).map(function(g){ return g.name + (g.penalty?" (pen)":g.owngoal?" (e.m.)":""); })
    ).join(", ") : null;

    return '<div class="match-card ' + status + '">' +
      '<span class="flags">' + flag(m.team1) + flag(m.team2) + '</span>' +
      '<div class="minfo">' +
        '<div class="mteams">' + m.team1 + ' vs. ' + m.team2 + '</div>' +
        '<div class="mmeta">' + fmtDate(m.date) +
          (m.ground ? ' &middot; ' + m.ground : '') +
          (scorers ? ' &middot; ' + scorers : '') +
        '</div>' +
      '</div>' +
      '<div class="mright">' +
        (resultStr ? '<span class="mresult">' + resultStr + '</span>' : '') +
        badge(status) +
      '</div>' +
    '</div>';
  }).join("");

  // Sluttspill
  var koRounds = koRoundsFor(team, matches);
  document.getElementById("knockout").innerHTML = koRounds.map(function(k, i) {
    var isLast = i === koRounds.length - 1;
    var html = '<div><div class="ko-card">';
    html += '<div class="ko-header"><span class="ko-round' + (k.isFinal ? " final" : "") + '">' + k.round + '</span>';
    html += '<div class="ko-meta"><span class="ko-date">' + k.date + '</span>' + badge("tbd") + '</div></div>';
    if (k.venue)    html += '<div class="ko-scenario">&#128205; ' + k.venue + '</div>';
    if (k.scenario) html += '<div class="ko-scenario">&#8505;&#65039; ' + k.scenario + '</div>';
    if (k.possible && k.possible.length) {
      html += '<div class="po-label">Mulige motstandere</div><div class="po-grid">';
      k.possible.forEach(function(p) {
        html += '<div class="po-tag"><span class="po-team">' + countryFlag(p.iso) + ' ' + p.team + '</span>';
        if (p.note) html += '<span class="po-note">' + p.note + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
    if (!isLast) html += '<div class="connector">&#11015;</div>';
    html += '</div>';
    return html;
  }).join("");
}

var loading = false;
function load() {
  if (loading) return;
  loading = true;
  var btn = document.getElementById("refresh-btn");
  var lbl = document.getElementById("ctrl-label");
  var err = document.getElementById("error-box");
  btn.disabled = true;
  btn.textContent = "Henter\u2026";
  lbl.textContent = "Henter data\u2026";
  err.style.display = "none";

  fetch(DATA_URL + "?t=" + Date.now())
    .then(function(r){ if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function(data) {
      allMatches = data.matches || [];
      populateSelector(allMatches);
      renderTeam(selectedTeam, allMatches);
      var now = new Date().toLocaleTimeString("nb-NO");
      lbl.textContent = "Oppdatert kl. " + now;
      document.getElementById("footer").textContent =
        "Data: openfootball/worldcup.json \u00b7 Oppdateres ca. \u00e9n gang i d\u00f8gnet \u00b7 Ingen API-n\u00f8kkel";
    })
    .catch(function(e) {
      err.textContent = "\u26a0\ufe0f Kunne ikke hente data: " + e.message;
      err.style.display = "block";
      lbl.textContent = "Feil ved henting";
    })
    .finally(function() {
      loading = false;
      btn.disabled = false;
      btn.textContent = "\u21bb Oppdater";
    });
}

load();
</script>
</body>
</html>
